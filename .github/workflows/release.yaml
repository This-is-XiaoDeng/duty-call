name: Release Build

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: python -m poetry install

      - name: Build with Nuitka
        run: |
          python -m poetry run python -m nuitka --standalone --enable-plugin=pyside6 --output-dir=build --assume-yes-for-downloads --windows-console-mode=disable launcher.py

      - name: Package build artifacts
        run: Compress-Archive -Path build\launcher.dist\* -DestinationPath duty-call-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: duty-call-windows.zip
